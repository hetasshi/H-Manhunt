# Конфигурация H-Manhunt
# Файл автоматически обновляется при запуске:
# добавляются только новые ключи, пользовательские значения не трогаются, комментарии сохраняются.

gameplay:
  # Начинать матч днем
  day-on-start: true
  # Очищать погоду при старте матча
  weather-clear-on-start: true
  # Длительность форы для спидраннеров в секундах
  head-start-seconds: 0
  # Количество жизней у каждого спидраннера
  speedrunners-lives: 1
  # Переводить погибших игроков в режим наблюдателя
  spectator-after-death: true
  # Телепортировать игроков к точке старта матча перед началом игры
  teleport-on-start: true
  # Включить урон по своим внутри команд
  friendly-fire: true
  # Очищать инвентари при старте матча
  clear-inventories: true
  # Временно снимать OP на время активного матча
  take-away-ops: true
  # Разрешить команды /manhunt pause и /manhunt unpause
  pause-enabled: true
  # Ускорять плавку в печках во время активного матча
  fast-furnace-speed: true

permissions:
  # Если true, команды смогут использовать только игроки с правами manhunt.*
  enabled: false

compass:
  # Разрешить охотникам выбирать цель через меню
  menu-enabled: false
  # Отслеживать ближайшего спидраннера вместо фиксированной цели
  track-nearest-mode: true
  # Продолжать отслеживание через порталы
  track-portals: true
  # Использовать новый BossBar-радар вместо стандартного локатора
  bossbar-radar: false

match-worlds:
  # Использовать отдельные матч-миры вместо текущего мира сервера
  enabled: true
  pool:
    # Брать матч-миры из заранее подготовленной партии
    enabled: true
    # Сколько комплектов миров готовить за одну партию
    batch-size: 10
    # Префикс для миров пула
    world-prefix: "manhunt_pool_"
    # Если при старте сервера нет готовых миров, начать подготовку партии
    prepare-on-startup-if-empty: true
    # Задержка перед автоподготовкой после запуска сервера
    prepare-startup-delay-seconds: 10
    # Пауза между подготовкой отдельных комплектов мира
    delay-between-worlds-seconds: 20
    # Держать лучший READY-комплект загруженным, остальные выгружать на диск
    unload-ready-worlds: true
    # Не возвращать тяжелую генерацию в /manhunt start, если пул пуст
    generate-on-start-if-empty: false
    # Удалять использованный комплект после reset/конца матча
    delete-used-worlds: true
  auto-generate:
    # Префикс для новых миров матча
    world-prefix: "manhunt_match_"
    # Сколько последних сгенерированных миров хранить
    keep-latest-worlds: 1
    # Сколько сидов пробовать перед выбором лучшего кандидата
    max-attempts: 2
    # Минимальный балл для немедленного принятия мира
    min-score-to-accept: 90
    # Если ни один кандидат не достиг порога, брать лучший из проверенных
    accept-best-candidate-if-threshold-missed: true
    # Необязательный список ручных сидов. Оставь пустым для случайных сидов
    fixed-seeds: []
    # Радиус поиска обычных структур вокруг спавна, в чанках
    structure-search-radius-chunks: 18
    # Радиус поиска редких структур, в чанках
    rare-structure-search-radius-chunks: 32
    # Расстояние от выбранной якорной структуры до точки старта матча
    start-distance-from-anchor: 100
    # Веса структур при выборе якорной структуры
    anchor-weights:
      village: 100
      ruined-portal: 100
      shipwreck: 100
      pillager-outpost: 100
      woodland-mansion: 100
    village:
      # Предпочитать деревни, где есть постройка кузнечного типа
      prefer-smith-building: true
      # Отбрасывать деревни без кузнечной постройки
      require-smith-building: true
      # Радиус поиска кузнечной постройки внутри деревни
      smith-search-radius-blocks: 64

casual:
  # Включить способности охотников через компас
  enabled: true
  warp-shadows:
    # Кулдаун Warp Shadows в секундах
    cooldown-seconds: 300
    # Расстояние до цели после варпа
    max-distance: 200
    # Минимальная дистанция, на которой Warp Shadows может сработать
    buffer-zone: 40

updates:
  # Включить или отключить проверку релизов на GitHub
  enabled: true
  # Автоматически проверять обновления при запуске
  check-on-startup: true
  github:
    # GitHub-аккаунт, который публикует релизы
    owner: "hetasshi"
    # GitHub-репозиторий с релизами
    repository: "H-Manhunt"
    # Учитывать prerelease-релизы
    allow-prerelease: false
    # Точное имя jar-артефакта для скачивания. Оставь пустым, чтобы взять первый .jar asset
    asset-name: ""
