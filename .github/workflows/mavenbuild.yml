name: Maven Build

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Версия, которую установить в pom.xml и использовать для сборки/релиза (например, 2.3.5)"
        required: true
        type: string
      mode:
        description: "Что сделать: только сборку или полноценный релиз"
        required: true
        default: "build"
        type: choice
        options:
          - build
          - release
      manual_release_body:
        description: "Необязательный текст релиза (только для режима release); заменяет авто-сгенерированные notes"
        required: false
        default: ""
        type: string

permissions:
  contents: write

concurrency:
  group: maven-main-${{ inputs.mode }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Забрать код
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: main

      - name: Проверить, что запуск идёт из main
        run: |
          if [[ "${GITHUB_REF_NAME}" != "main" ]]; then
            echo "This workflow can only run from the main branch. Current branch: ${GITHUB_REF_NAME}"
            exit 1
          fi

      - name: Поставить Java 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Прочитать текущую версию из pom.xml
        id: current_version
        run: |
          VERSION=$(mvn -q -DforceStdout help:evaluate -Dexpression=project.version)
          echo "value=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Проверить, нужно ли менять pom.xml
        id: version_change
        env:
          CURRENT_VERSION: ${{ steps.current_version.outputs.value }}
          TARGET_VERSION: ${{ inputs.version }}
        run: |
          if [[ "$CURRENT_VERSION" == "$TARGET_VERSION" ]]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Обновить версию в pom.xml
        if: ${{ steps.version_change.outputs.changed == 'true' }}
        run: mvn -B versions:set -DnewVersion=${{ inputs.version }} -DgenerateBackupPoms=false

      - name: Подготовить метаданные артефакта
        id: artifact_meta
        env:
          MODE: ${{ inputs.mode }}
          VERSION: ${{ inputs.version }}
          MANUAL_RELEASE_BODY: ${{ inputs.manual_release_body }}
        run: |
          TITLE="H-Manhunt ${VERSION}"

          HAS_CUSTOM_BODY=false
          if [[ "$MODE" == "release" && -n "$MANUAL_RELEASE_BODY" ]]; then
            HAS_CUSTOM_BODY=true
          fi

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"
          echo "jar=H-Manhunt-${VERSION}.jar" >> "$GITHUB_OUTPUT"
          echo "title=${TITLE}" >> "$GITHUB_OUTPUT"
          echo "has_custom_body=${HAS_CUSTOM_BODY}" >> "$GITHUB_OUTPUT"
          {
            echo "body<<EOF"
            echo "$MANUAL_RELEASE_BODY"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Собрать плагин
        run: mvn -B package --file pom.xml

      - name: Проверить, что jar реально собрался
        env:
          JAR_NAME: ${{ steps.artifact_meta.outputs.jar }}
        run: |
          if [[ ! -f "target/${JAR_NAME}" ]]; then
            echo "Не найден файл target/${JAR_NAME}"
            exit 1
          fi

      - name: Закоммитить новую версию
        if: ${{ steps.version_change.outputs.changed == 'true' }}
        env:
          NEXT_VERSION: ${{ inputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout main
          git add pom.xml
          git commit -m "build: bump version to ${NEXT_VERSION}"
          git push origin HEAD:main

      - name: Загрузить jar в artifacts
        uses: actions/upload-artifact@v6
        with:
          name: ${{ steps.artifact_meta.outputs.jar }}
          path: target/${{ steps.artifact_meta.outputs.jar }}
          if-no-files-found: error
          retention-days: 30

      - name: Проверить, что версия подходит для релиза
        if: ${{ inputs.mode == 'release' }}
        env:
          VERSION: ${{ steps.artifact_meta.outputs.version }}
        run: |
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Для релиза поддерживается только формат X.Y.Z. Сейчас: $VERSION"
            exit 1
          fi

      - name: Проверить, что такого тега ещё нет
        if: ${{ inputs.mode == 'release' }}
        env:
          TAG_NAME: ${{ steps.artifact_meta.outputs.tag }}
        run: |
          if git rev-parse "$TAG_NAME" >/dev/null 2>&1; then
            echo "Тег $TAG_NAME уже существует."
            exit 1
          fi

          if git ls-remote --tags origin "refs/tags/${TAG_NAME}" | grep -q .; then
            echo "Тег $TAG_NAME уже есть в origin."
            exit 1
          fi

      - name: Проверить, что такого релиза ещё нет
        if: ${{ inputs.mode == 'release' }}
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ steps.artifact_meta.outputs.tag }}
        run: |
          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            echo "Релиз $TAG_NAME уже существует."
            exit 1
          fi

      - name: Поставить тег и отправить его в origin
        if: ${{ inputs.mode == 'release' }}
        env:
          TAG_NAME: ${{ steps.artifact_meta.outputs.tag }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "$TAG_NAME"
          git push origin "$TAG_NAME"

      - name: Создать GitHub Release и приложить jar
        if: ${{ inputs.mode == 'release' && steps.artifact_meta.outputs.has_custom_body != 'true' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.artifact_meta.outputs.tag }}
          target_commitish: main
          name: ${{ steps.artifact_meta.outputs.title }}
          files: target/${{ steps.artifact_meta.outputs.jar }}
          generate_release_notes: true

      - name: Создать GitHub Release с кастомным body и приложить jar
        if: ${{ inputs.mode == 'release' && steps.artifact_meta.outputs.has_custom_body == 'true' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.artifact_meta.outputs.tag }}
          target_commitish: main
          name: ${{ steps.artifact_meta.outputs.title }}
          body: ${{ steps.artifact_meta.outputs.body }}
          files: target/${{ steps.artifact_meta.outputs.jar }}

      - name: Короткая сводка
        env:
          MODE: ${{ inputs.mode }}
          CURRENT_VERSION: ${{ steps.current_version.outputs.value }}
          NEXT_VERSION: ${{ steps.artifact_meta.outputs.version }}
          VERSION_CHANGED: ${{ steps.version_change.outputs.changed }}
          TAG_NAME: ${{ steps.artifact_meta.outputs.tag }}
          HAS_CUSTOM_BODY: ${{ steps.artifact_meta.outputs.has_custom_body }}
          JAR_NAME: ${{ steps.artifact_meta.outputs.jar }}
        run: |
          {
            if [[ "$MODE" == "release" ]]; then
              echo "## Release completed"
            else
              echo "## Build completed"
            fi
            echo ""
            echo "- Mode: \`${MODE}\`"
            echo "- Previous version: \`${CURRENT_VERSION}\`"
            echo "- Version changed: \`${VERSION_CHANGED}\`"
            echo "- New version: \`${NEXT_VERSION}\`"
            echo "- Artifact: \`${JAR_NAME}\`"
            if [[ "$MODE" == "release" ]]; then
              echo "- Custom release body: \`${HAS_CUSTOM_BODY}\`"
              echo "- Tag: \`${TAG_NAME}\`"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
