name: Maven Build

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Что сделать: только сборку или полноценный релиз"
        required: true
        default: "build"
        type: choice
        options:
          - build
          - release
      bump:
        description: "Какую часть версии поднять перед сборкой"
        required: true
        default: "patch"
        type: choice
        options:
          - patch
          - minor
          - major
      manual_version:
        description: "Использовать вручную указанную версию вместо автоматического bump"
        required: true
        default: false
        type: boolean
      manual_version_value:
        description: "Версия, которую использовать при включенном manual_version"
        required: false
        default: ""
        type: string
      manual_release_title:
        description: "Необязательный заголовок релиза для режима release"
        required: false
        default: ""
        type: string
      manual_release_body:
        description: "Необязательный текст релиза для режима release; заменяет авто-сгенерированные notes"
        required: false
        default: ""
        type: string

permissions:
  contents: write

concurrency:
  group: maven-main-${{ inputs.mode }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Забрать код
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: main

      - name: Проверить, что запуск идёт из main
        run: |
          if [[ "${GITHUB_REF_NAME}" != "main" ]]; then
            echo "This workflow can only run from the main branch. Current branch: ${GITHUB_REF_NAME}"
            exit 1
          fi

      - name: Поставить Java 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Прочитать текущую версию из pom.xml
        id: current_version
        run: |
          VERSION=$(mvn -q -DforceStdout help:evaluate -Dexpression=project.version)
          echo "value=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Определить итоговую версию
        id: target_version
        env:
          CURRENT_VERSION: ${{ steps.current_version.outputs.value }}
          BUMP_TYPE: ${{ inputs.bump }}
          MANUAL_VERSION: ${{ inputs.manual_version }}
          MANUAL_VERSION_VALUE: ${{ inputs.manual_version_value }}
        run: |
          if [[ "$MANUAL_VERSION" == "true" ]]; then
            if [[ -z "$MANUAL_VERSION_VALUE" ]]; then
              echo "manual_version is enabled, but manual_version_value is empty."
              exit 1
            fi

            echo "value=$MANUAL_VERSION_VALUE" >> "$GITHUB_OUTPUT"
            echo "source=manual" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT_VERSION"

          if [[ -z "$MAJOR" || -z "$MINOR" || -z "$PATCH" ]]; then
            echo "Unsupported version format: $CURRENT_VERSION"
            exit 1
          fi

          case "$BUMP_TYPE" in
            major)
              NEXT_VERSION="$((MAJOR + 1)).0.0"
              ;;
            minor)
              NEXT_VERSION="${MAJOR}.$((MINOR + 1)).0"
              ;;
            patch)
              NEXT_VERSION="${MAJOR}.${MINOR}.$((PATCH + 1))"
              ;;
            *)
              echo "Unknown bump type: $BUMP_TYPE"
              exit 1
              ;;
          esac

          echo "value=$NEXT_VERSION" >> "$GITHUB_OUTPUT"
          echo "source=auto-bump" >> "$GITHUB_OUTPUT"

      - name: Обновить версию в pom.xml
        run: mvn -B versions:set -DnewVersion=${{ steps.target_version.outputs.value }} -DgenerateBackupPoms=false

      - name: Подготовить метаданные артефакта
        id: artifact_meta
        env:
          MODE: ${{ inputs.mode }}
          VERSION: ${{ steps.target_version.outputs.value }}
          MANUAL_RELEASE_TITLE: ${{ inputs.manual_release_title }}
          MANUAL_RELEASE_BODY: ${{ inputs.manual_release_body }}
        run: |
          TITLE="$MANUAL_RELEASE_TITLE"
          if [[ -z "$TITLE" ]]; then
            TITLE="H-Manhunt ${VERSION}"
          fi

          HAS_CUSTOM_BODY=false
          if [[ "$MODE" == "release" && -n "$MANUAL_RELEASE_BODY" ]]; then
            HAS_CUSTOM_BODY=true
          fi

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"
          echo "jar=H-Manhunt-${VERSION}.jar" >> "$GITHUB_OUTPUT"
          echo "title=${TITLE}" >> "$GITHUB_OUTPUT"
          echo "has_custom_body=${HAS_CUSTOM_BODY}" >> "$GITHUB_OUTPUT"
          {
            echo "body<<EOF"
            echo "$MANUAL_RELEASE_BODY"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Собрать плагин
        run: mvn -B package --file pom.xml

      - name: Проверить, что jar реально собрался
        env:
          JAR_NAME: ${{ steps.artifact_meta.outputs.jar }}
        run: |
          if [[ ! -f "target/${JAR_NAME}" ]]; then
            echo "Expected file target/${JAR_NAME} was not found"
            exit 1
          fi

      - name: Закоммитить новую версию
        env:
          NEXT_VERSION: ${{ steps.target_version.outputs.value }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout main
          git add pom.xml
          git commit -m "build: bump version to ${NEXT_VERSION}"
          git push origin HEAD:main

      - name: Загрузить jar в artifacts
        uses: actions/upload-artifact@v6
        with:
          name: ${{ steps.artifact_meta.outputs.jar }}
          path: target/${{ steps.artifact_meta.outputs.jar }}
          if-no-files-found: error
          retention-days: 30

      - name: Проверить, что версия подходит для релиза
        if: ${{ inputs.mode == 'release' }}
        env:
          VERSION: ${{ steps.artifact_meta.outputs.version }}
        run: |
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Only X.Y.Z version format is supported. Current value: $VERSION"
            exit 1
          fi

      - name: Проверить, что такого тега ещё нет
        if: ${{ inputs.mode == 'release' }}
        env:
          TAG_NAME: ${{ steps.artifact_meta.outputs.tag }}
        run: |
          if git rev-parse "$TAG_NAME" >/dev/null 2>&1; then
            echo "Tag $TAG_NAME already exists."
            exit 1
          fi

          if git ls-remote --tags origin "refs/tags/${TAG_NAME}" | grep -q .; then
            echo "Tag $TAG_NAME already exists in origin."
            exit 1
          fi

      - name: Проверить, что такого релиза ещё нет
        if: ${{ inputs.mode == 'release' }}
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ steps.artifact_meta.outputs.tag }}
        run: |
          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            echo "Release $TAG_NAME already exists."
            exit 1
          fi

      - name: Поставить тег и отправить его в origin
        if: ${{ inputs.mode == 'release' }}
        env:
          TAG_NAME: ${{ steps.artifact_meta.outputs.tag }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "$TAG_NAME"
          git push origin "$TAG_NAME"

      - name: Создать GitHub Release и приложить jar
        if: ${{ inputs.mode == 'release' && steps.artifact_meta.outputs.has_custom_body != 'true' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.artifact_meta.outputs.tag }}
          target_commitish: main
          name: ${{ steps.artifact_meta.outputs.title }}
          files: target/${{ steps.artifact_meta.outputs.jar }}
          generate_release_notes: true

      - name: Создать GitHub Release с кастомным body и приложить jar
        if: ${{ inputs.mode == 'release' && steps.artifact_meta.outputs.has_custom_body == 'true' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.artifact_meta.outputs.tag }}
          target_commitish: main
          name: ${{ steps.artifact_meta.outputs.title }}
          body: ${{ steps.artifact_meta.outputs.body }}
          files: target/${{ steps.artifact_meta.outputs.jar }}

      - name: Короткая сводка
        env:
          MODE: ${{ inputs.mode }}
          CURRENT_VERSION: ${{ steps.current_version.outputs.value }}
          NEXT_VERSION: ${{ steps.artifact_meta.outputs.version }}
          BUMP_TYPE: ${{ inputs.bump }}
          VERSION_SOURCE: ${{ steps.target_version.outputs.source }}
          TAG_NAME: ${{ steps.artifact_meta.outputs.tag }}
          RELEASE_TITLE: ${{ steps.artifact_meta.outputs.title }}
          HAS_CUSTOM_BODY: ${{ steps.artifact_meta.outputs.has_custom_body }}
          JAR_NAME: ${{ steps.artifact_meta.outputs.jar }}
        run: |
          {
            if [[ "$MODE" == "release" ]]; then
              echo "## Release completed"
            else
              echo "## Build completed"
            fi
            echo ""
            echo "- Mode: \`${MODE}\`"
            echo "- Previous version: \`${CURRENT_VERSION}\`"
            echo "- Bump type: \`${BUMP_TYPE}\`"
            echo "- Version source: \`${VERSION_SOURCE}\`"
            echo "- New version: \`${NEXT_VERSION}\`"
            echo "- Artifact: \`${JAR_NAME}\`"
            if [[ "$MODE" == "release" ]]; then
              echo "- Release title: \`${RELEASE_TITLE}\`"
              echo "- Custom release body: \`${HAS_CUSTOM_BODY}\`"
              echo "- Tag: \`${TAG_NAME}\`"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
